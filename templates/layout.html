<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaisaVasool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Chart.js and Socket.IO -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const isAuthPath = window.location.pathname !== '/' && window.location.pathname !== '/login' && window.location.pathname !== '/register';
        if(isAuthPath && !localStorage.getItem('token')) {
            window.location.href = '/login';
        }
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-wallet2"></i> PaisaVasool</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-items">
                    <!-- Nav items injected via JS based on auth state -->
                </ul>
                <div class="dropdown ms-2">
                    <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-globe"></i> <span id="langDisplay">EN</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item lang-btn" href="#" data-lang="en">English (EN)</a></li>
                        <li><a class="dropdown-item lang-btn" href="#" data-lang="hi">हिंदी (HI)</a></li>
                        <li><a class="dropdown-item lang-btn" href="#" data-lang="es">Español (ES)</a></li>
                    </ul>
                </div>
                <button class="btn btn-outline-light ms-2" id="darkModeToggle">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        <div id="alert-container"></div>
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
